name: release

# Publishes the Python package to PyPI and the hook-installer to npm when a
# GitHub Release is published. The tag should match the version declared in
# pyproject.toml / package.json / aprx_tools/__init__.py (e.g. v0.1.0).
# See "Releasing" in the README for the one-time registry setup and the per-
# release version-bump steps.
on:
  release:
    types: [published]
  workflow_dispatch: {} # allow a manual run (e.g. to retry a failed publish)

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC) — no API token is stored. Configure a publisher
    # on PyPI for project "aprx-tools" pointing at this repo, workflow
    # "release.yml", environment "pypi" (a *pending* publisher before the first
    # upload, since the project does not exist on PyPI yet).
    environment:
      name: pypi
      url: https://pypi.org/p/aprx-tools
    permissions:
      id-token: write # required to mint the OIDC token PyPI verifies
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # enables npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        # Requires an NPM_TOKEN repo secret: an npm automation (or granular
        # write) token for the aprx-tools package.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
